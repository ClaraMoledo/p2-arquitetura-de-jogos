name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/catalog-service
          - services/reviews-service
          - services/players-service
          - gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements-dev.txt
      - name: Rodar testes unitários
        working-directory: ${{ matrix.service }}
        run: pytest -q

  behave:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - services/catalog-service
          - services/reviews-service
          - services/players-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dependências
        working-directory: ${{ matrix.service }}
        run: pip install -r requirements-dev.txt
      - name: Rodar cenários BDD
        working-directory: ${{ matrix.service }}
        run: behave tests/bdd/features
