name: ludoteca

services:
  # ---- Bancos (um por microsserviço) ----
  catalog-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ludoteca
      POSTGRES_PASSWORD: ${CATALOG_DB_PASSWORD:-ludoteca_catalog}
      POSTGRES_DB: catalog_db
    volumes:
      - catalog-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ludoteca -d catalog_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  reviews-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ludoteca
      POSTGRES_PASSWORD: ${REVIEWS_DB_PASSWORD:-ludoteca_reviews}
      POSTGRES_DB: reviews_db
    volumes:
      - reviews-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ludoteca -d reviews_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  players-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ludoteca
      POSTGRES_PASSWORD: ${PLAYERS_DB_PASSWORD:-ludoteca_players}
      POSTGRES_DB: players_db
    volumes:
      - players-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ludoteca -d players_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Microsserviços ----
  catalog-service:
    build: ./services/catalog-service
    environment:
      PORT: 8001
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://ludoteca:${CATALOG_DB_PASSWORD:-ludoteca_catalog}@catalog-db:5432/catalog_db
    depends_on:
      - catalog-db
    restart: unless-stopped

  reviews-service:
    build: ./services/reviews-service
    environment:
      PORT: 8002
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://ludoteca:${REVIEWS_DB_PASSWORD:-ludoteca_reviews}@reviews-db:5432/reviews_db
    depends_on:
      - reviews-db
    restart: unless-stopped

  players-service:
    build: ./services/players-service
    environment:
      PORT: 8003
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg2://ludoteca:${PLAYERS_DB_PASSWORD:-ludoteca_players}@players-db:5432/players_db
    depends_on:
      - players-db
    restart: unless-stopped

  # ---- Gateway / BFF ----
  gateway:
    build: ./gateway
    environment:
      PORT: 8000
      CATALOG_SERVICE_URL: http://catalog-service:8001
      REVIEWS_SERVICE_URL: http://reviews-service:8002
      PLAYERS_SERVICE_URL: http://players-service:8003
    depends_on:
      - catalog-service
      - reviews-service
      - players-service
    restart: unless-stopped

  # ---- Frontend (entrada pública) ----
  web:
    build: ./web
    environment:
      # Host interno do gateway. Local: "gateway:8000". Em hospedagem que
      # prefixa nomes de serviço (ex.: EasyPanel), ajuste para "projeto_gateway:8000".
      GATEWAY_UPSTREAM: ${GATEWAY_UPSTREAM:-gateway:8000}
    # Sem "ports" aqui: em hospedagem (EasyPanel) o acesso é por domínio,
    # apontando para a porta 80 do contêiner. Para rodar LOCAL com porta
    # publicada, use o docker-compose.override.yml (carregado automaticamente).
    expose:
      - "80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  catalog-db-data:
  reviews-db-data:
  players-db-data:
